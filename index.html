<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALERTNET | Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        #header { font-size: 42px; letter-spacing: 12px; margin-bottom: 40px; font-weight: 200; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .box { padding: 30px; width: 90%; max-width: 500px; }
        #prompt-display { font-size: 20px; margin-bottom: 30px; color: #333; min-height: 1.5em; font-weight: 500; }
        button { background: #000; color: #fff; border: none; padding: 18px 45px; cursor: pointer; font-size: 15px; letter-spacing: 3px; transition: 0.4s; text-transform: uppercase; font-weight: bold; }
        button:hover { background: #444; transform: scale(1.05); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 11px; color: #888; margin-top: 25px; letter-spacing: 1px; }
        #game-container { width: 100vw; height: 100vh; display: none; position: fixed; top: 0; left: 0; background: #000; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        #bar { width: 0%; height: 3px; background: #000; position: fixed; top: 0; left: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div id="bar"></div>
<div id="header">ALERTNET</div>

<div class="box" id="ui">
    <div id="prompt-display">Verifica link in corso...</div>
    <button id="btn-generate">GENERA GIOCO</button>
    <div id="status">SISTEMA PRONTO</div>
</div>

<div id="game-container"></div>

<script>
    // --- 1. CONFIGURAZIONE CHIAVI ---
    const GEMINI_API_KEY = "AIzaSyD-AOtVodB9RihAqsifeT7dwDR_FLvaKFg"; 
    const SUPABASE_URL = "https://nhtswfhokhyqdhjduwj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5odHN3Zmxob2toeXFkaGRqdXdqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTE2MjEyNiwiZXhwIjoyMDkwNzM4MTI2fQ.ep0cQ_Gyjx0y2lYHKb6YGk8BPirVAvgGWk_gC02InPc";

    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- 2. LETTURA IMMEDIATA DEL LINK ---
    const params = new URLSearchParams(window.location.search);
    const promptDati = params.get('prompt');
    const display = document.getElementById('prompt-display');

    if (promptDati && promptDati.trim() !== "") {
        display.innerText = decodeURIComponent(promptDati).toUpperCase();
        console.log("Prompt caricato:", promptDati);
    } else {
        display.innerText = "ERRORE: Nessun comando ricevuto dal Bot";
        display.style.color = "red";
        document.getElementById('btn-generate').style.display = "none";
    }

    // --- 3. LOGICA DI GENERAZIONE ---
    async function avvia() {
        const btn = document.getElementById('btn-generate');
        const stat = document.getElementById('status');
        const bar = document.getElementById('bar');

        btn.disabled = true;
        stat.innerText = "AI STA ELABORANDO IL CODICE...";
        bar.style.width = "40%";

        const promptPerAI = `Crea un gioco arcade HTML5/JS singolo file. Titolo: ${promptDati}. Colori: B/N. Controlli: Frecce o Mouse. Solo codice funzionante senza spiegazioni.`;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptPerAI }] }] })
            });

            const resData = await resp.json();
            if (resData.error) throw new Error(resData.error.message);

            let codiceHTML = resData.candidates[0].content.parts[0].text;
            codiceHTML = codiceHTML.replace(/```html|```/g, "").trim();

            bar.style.width = "80%";
            stat.innerText = "SALVATAGGIO NEL DATABASE...";

            // Salvataggio (RLS deve essere DISABLED su Supabase)
            await supabase.from('giochi').insert([
                { nome: promptDati, codice: codiceHTML, autore: "DiscordUser" }
            ]);

            bar.style.width = "100%";
            stat.innerText = "COMPLETATO!";

            // Lancio del gioco
            document.getElementById('ui').style.display = "none";
            document.getElementById('header').style.display = "none";
            const box = document.getElementById('game-container');
            box.style.display = "block";

            const frame = document.createElement('iframe');
            box.appendChild(frame);
            frame.contentWindow.document.open();
            frame.contentWindow.document.write(codiceHTML);
            frame.contentWindow.document.close();

        } catch (e) {
            stat.innerText = "ERRORE CRITICO: " + e.message;
            btn.disabled = false;
            bar.style.width = "0%";
        }
    }

    document.getElementById('btn-generate').onclick = avvia;
</script>

</body>
</html>
