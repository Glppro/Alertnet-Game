<!DOCTYPE html>
<html lang="it">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALERTNET | Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: 'Helvetica', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #header { font-size: 40px; letter-spacing: 15px; margin-bottom: 50px; font-weight: 300; text-transform: uppercase; }
        #game-container { width: 90vw; height: 70vh; border: 1px solid #eee; display: none; background: #000; }
        .ui-container { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        #prompt-display { font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        button { background: #000; color: #fff; border: none; padding: 15px 40px; cursor: pointer; font-size: 14px; letter-spacing: 2px; transition: 0.3s; }
        button:hover { background: #333; }
        #status { font-size: 10px; color: #999; margin-top: 20px; text-transform: uppercase; }
        iframe { width: 100%; height: 100%; border: none; }
        #loader { width: 0%; height: 2px; background: #000; position: fixed; top: 0; left: 0; transition: 0.5s; }
    </style>
</head>
<body>

<div id="loader"></div>
<div id="header">ALERTNET</div>

<div class="ui-container" id="ui">
    <div id="prompt-display">Caricamento prompt...</div>
    <button id="btn-generate">GENERA GIOCO</button>
    <div id="status">Pronto per il rendering</div>
</div>

<div id="game-container"></div>

<script>
    
    // --- CONFIGURAZIONE CHIAVI (INCOLLA LE TUE QUI) ---
    const GEMINI_API_KEY = "AIzaSyD-AOtVodB9RihAqsifeT7dwDR_FLvaKFg"; 
    const SUPABASE_URL = "https://nhtswfhokhyqdhjduwj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HPzdjlGQBCSsqkzn6TetFw_12nHXRAm"; // Quella che inizia con sb_publishable

    // Inizializza Supabase
    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- LOGICA DI LETTURA PROMPT ---
    // Questa parte serve a leggere "?prompt=Qualcosa" dal link del bot
    const urlParams = new URLSearchParams(window.location.search);
    const promptValue = urlParams.get('prompt');
    const display = document.getElementById('prompt-display');

    if (promptValue) {
        display.innerText = decodeURIComponent(promptValue);
    } else {
        display.innerText = "Nessun prompt ricevuto";
    }

    // --- FUNZIONE DI GENERAZIONE ---
    async function generaGioco() {
        if (!promptValue) {
            alert("Errore: nessun prompt trovato nel link!");
            return;
        }

        const btn = document.getElementById('btn-generate');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader-bar');

        btn.disabled = true;
        status.innerText = "AI sta scrivendo il codice...";
        loader.style.width = "40%";

        const systemPrompt = `Crea un gioco HTML5 singolo file (HTML/CSS/JS). Tema: ${promptValue}. Usa controlli tastiera o mouse. Colori: Bianco e Nero. Solo codice puro.`;

        try {
            // Chiamata a Gemini
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            let code = data.candidates[0].content.parts[0].text;
            code = code.replace(/```html|```/g, "").trim();

            loader.style.width = "80%";
            status.innerText = "Salvataggio nel Database...";

            // Salva su Supabase (RLS deve essere DISABLED)
            await supabase.from('giochi').insert([
                { nome: promptValue, codice: code, autore: "User Discord" }
            ]);

            loader.style.width = "100%";
            status.innerText = "Rendering completato!";

            // Nascondi UI e mostra gioco
            document.getElementById('ui').style.display = "none";
            const container = document.getElementById('game-container');
            container.style.display = "block";

            const iframe = document.createElement('iframe');
            container.appendChild(iframe);
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(code);
            iframe.contentWindow.document.close();

        } catch (err) {
            console.error(err);
            status.innerText = "ERRORE: " + err.message;
            btn.disabled = false;
            loader.style.width = "0%";
        }
    }

    document.getElementById('btn-generate').addEventListener('click', generaGioco);
</script>

</body>
</html>
