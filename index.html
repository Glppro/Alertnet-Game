<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertnet | Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #000000; --bg: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #mainUI { text-align: center; width: 100%; max-width: 600px; padding: 20px; }
        h1 { font-weight: 200; font-size: 3rem; letter-spacing: 15px; text-transform: uppercase; margin-bottom: 40px; }
        #promptInput { width: 100%; border: none; border-bottom: 2px solid #eee; padding: 15px; font-size: 1.2rem; outline: none; text-align: center; margin-bottom: 20px; }
        .btn-gen { background: var(--accent); color: white; border: none; padding: 15px 40px; cursor: pointer; letter-spacing: 3px; text-transform: uppercase; }
        #status { margin-top: 25px; font-size: 0.8rem; color: #aaa; }
        #gameView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; z-index: 100; }
        .game-header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="mainUI">
        <h1>Alertnet</h1>
        <input type="text" id="promptInput" placeholder="DESCRIVI IL TUO MONDO...">
        <button id="genBtn" class="btn-gen" onclick="generateGame()">GENERA GIOCO</button>
        <div id="status">Pronto all'azione</div>
    </div>

    <div id="gameView">
        <div class="game-header">
            <span>ALERTNET ENGINE</span>
            <button onclick="location.reload()">INDIETRO</button>
        </div>
        <iframe id="gameFrame"></iframe>
    </div>

    <script>
        // CONFIGURAZIONE
        const GEMINI_API_KEY = "AIzaSyBEnVeLGo7OERB0e6tFp_pC5PQThhcyj3M";
        const SUPABASE_URL = "https://nhtswfhokhyqdhjduwj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_lhYukOcXbOZpUnPsRTVdvQ_GkAmKwq9"; // Assicurati sia questa la tua KEY anonima

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function generateGame() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            if(!prompt) return;

            btn.disabled = true;
            status.innerText = "IA sta programmando... attendi...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Crea un gioco HTML5 Canvas realistico tema: ${prompt}. Rispondi SOLO con il codice HTML completo.` }] }]
                    })
                });

                const data = await response.json();
                
                // Controllo se Gemini ha risposto correttamente
                if(!data.candidates) {
                    throw new Error("La chiave API potrebbe essere limitata o errata.");
                }

                let code = data.candidates[0].content.parts[0].text;
                code = code.replace(/```html|```/g, "").trim();

                // Salvataggio (opzionale, se fallisce prosegue comunque)
                try {
                    await supabaseClient.from('giochi').insert([{ nome: prompt, codice: code, autore: "User" }]);
                } catch(e) { console.log("Database non pronto, ma avvio il gioco..."); }

                // Avvio Gioco
                document.getElementById('mainUI').style.display = "none";
                document.getElementById('gameView').style.display = "flex";
                const frame = document.getElementById('gameFrame');
                const d = frame.contentWindow.document;
                d.open(); d.write(code); d.close();

            } catch (err) {
                console.error(err);
                status.innerText = "ERRORE: " + err.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
