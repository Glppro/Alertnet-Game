<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ALERTNET | Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #header { font-size: 40px; letter-spacing: 10px; margin-bottom: 30px; border-bottom: 2px solid #000; }
        #prompt-display { font-size: 24px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
        button { background: #000; color: #fff; border: none; padding: 20px 50px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; color: #666; font-size: 12px; }
        #game-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="header">ALERTNET</div>
    <div id="prompt-display">CARICAMENTO...</div>
    <button id="btn-generate">GENERA GIOCO</button>
    <div id="status">SISTEMA PRONTO</div>

    <div id="game-container"></div>

<script>
    // --- CHIAVI ---
    const G_KEY = "METTI_QUI_LA_TUA_CHIAVE_GEMINI";
    const S_URL = "https://nhtswfhokhyqdhjduwj.supabase.co";
    const S_KEY = "METTI_QUI_LA_TUA_CHIAVE_ANON_SUPABASE";

    const supabase = libsupabase.createClient(S_URL, S_KEY);

    // --- LOGICA LETTURA LINK ---
    const urlParams = new URLSearchParams(window.location.search);
    const ilPrompt = urlParams.get('prompt');

    if (ilPrompt) {
        document.getElementById('prompt-display').innerText = ilPrompt;
    } else {
        document.getElementById('prompt-display').innerText = "NESSUN PROMPT TROVATO";
        document.getElementById('btn-generate').style.display = "none";
    }

    // --- GENERAZIONE ---
    document.getElementById('btn-generate').onclick = async () => {
        const btn = document.getElementById('btn-generate');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerText = "GENERAZIONE IN CORSO CON GEMINI...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${G_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Crea un gioco arcade HTML singolo file basato su: " + ilPrompt }] }] })
            });

            const data = await response.json();
            let code = data.candidates[0].content.parts[0].text;
            code = code.replace(/```html|```/g, "").trim();

            status.innerText = "SALVATAGGIO NEL DATABASE...";
            await supabase.from('giochi').insert([{ nome: ilPrompt, codice: code }]);

            // MOSTRA GIOCO
            document.getElementById('game-container').style.display = "block";
            const iframe = document.createElement('iframe');
            document.getElementById('game-container').appendChild(iframe);
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(code);
            iframe.contentWindow.document.close();

        } catch (err) {
            status.innerText = "ERRORE: " + err.message;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
